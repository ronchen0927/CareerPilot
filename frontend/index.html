<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JobRadar — 104 人力銀行職缺快速搜尋工具">
  <title>JobRadar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Theme toggle -->
  <button id="theme-toggle" class="theme-toggle" aria-label="切換深色/淺色模式">
    <span class="theme-toggle__icon">🌙</span>
  </button>

  <!-- Background glow effects -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <span class="header__icon">📡</span>
        <h1 class="header__title">JobRadar</h1>
      </div>
      <p class="header__subtitle">104 人力銀行職缺快速搜尋</p>
    </header>

    <!-- Search Form -->
    <section class="search-card">
      <form id="search-form">
        <!-- Keyword (comma-separated multi-keyword support) -->
        <div class="form-group">
          <label class="form-label" for="keyword">
            <span class="form-label__icon">💼</span>
            搜尋關鍵字
            <span class="form-label__hint">多個關鍵字用逗號分隔，最多 5 個</span>
          </label>
          <input type="text" id="keyword" class="form-input" placeholder="例：Python, 後端工程師, Django" value="Python" required>
        </div>

        <!-- Pages -->
        <div class="form-group">
          <label class="form-label" for="pages">
            <span class="form-label__icon">📄</span>
            爬取頁數
          </label>
          <input type="number" id="pages" class="form-input" value="5" min="1" max="20">
        </div>

        <!-- Area checkboxes (dynamically loaded) -->
        <div class="form-group">
          <label class="form-label">
            <span class="form-label__icon">📍</span>
            選擇地區
          </label>
          <div id="area-options" class="checkbox-grid">
            <!-- Loaded by JS -->
          </div>
        </div>

        <!-- Experience checkboxes (dynamically loaded) -->
        <div class="form-group">
          <label class="form-label">
            <span class="form-label__icon">⏳</span>
            經歷要求
          </label>
          <div id="experience-options" class="checkbox-grid">
            <!-- Loaded by JS -->
          </div>
        </div>

        <!-- Min Salary filter -->
        <div class="form-group">
          <label class="form-label" for="min-salary">
            <span class="form-label__icon">💰</span>
            最低月薪（元，0 為不限）
          </label>
          <input type="number" id="min-salary" class="form-input" value="0" min="0" step="1000" placeholder="例：40000">
        </div>

        <button type="submit" id="search-btn" class="btn-search">
          <span class="btn-search__text">開始搜尋</span>
          <span class="btn-search__icon">→</span>
        </button>
      </form>
    </section>

    <!-- Loading -->
    <section id="loading" class="loading hidden">
      <div class="loading__spinner"></div>
      <p class="loading__text">正在搜尋職缺中...</p>
    </section>

    <!-- Results -->
    <section id="results" class="results hidden">
      <div class="results__header">
        <h2 class="results__title">搜尋結果</h2>
        <div class="results__meta">
          <span id="result-count" class="results__badge"></span>
          <span id="result-time" class="results__time"></span>
          <button id="export-csv-btn" class="btn-export">匯出 CSV</button>
        </div>
      </div>
      <!-- Keyword tags (shown when multi-keyword search) -->
      <div id="keyword-tags" class="keyword-tags"></div>
      <div class="table-wrapper">
        <table class="results-table">
          <thead>
            <tr>
              <th>刊登日期</th>
              <th>職位</th>
              <th>公司名稱</th>
              <th>城市</th>
              <th>經歷</th>
              <th>最低學歷</th>
              <th>薪水</th>
              <th>收藏</th>
            </tr>
          </thead>
          <tbody id="results-body">
          </tbody>
        </table>
      </div>
    </section>

    <!-- Error -->
    <section id="error" class="error-card hidden">
      <span class="error-card__icon">⚠️</span>
      <p id="error-message" class="error-card__text"></p>
      <button id="error-dismiss" class="btn-dismiss">關閉</button>
    </section>

    <!-- Bookmarks -->
    <section id="bookmarks" class="bookmarks hidden">
      <div class="bookmarks__header">
        <h2 class="bookmarks__title">★ 收藏列表</h2>
        <span id="bookmark-count" class="results__badge"></span>
        <a href="dashboard.html" class="btn-dashboard">看板視圖 →</a>
      </div>
      <div class="table-wrapper">
        <table class="results-table">
          <thead>
            <tr>
              <th>刊登日期</th>
              <th>職位</th>
              <th>公司名稱</th>
              <th>城市</th>
              <th>薪水</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="bookmarks-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Job Detail Modal -->
  <div id="job-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-job">
    <div class="modal">
      <button id="modal-close" class="modal__close" aria-label="關閉">✕</button>
      <h3 id="modal-job" class="modal__title"></h3>
      <div class="modal__grid">
        <div class="modal__field">
          <span class="modal__label">公司</span>
          <span id="modal-company" class="modal__value"></span>
        </div>
        <div class="modal__field">
          <span class="modal__label">城市</span>
          <span id="modal-city" class="modal__value"></span>
        </div>
        <div class="modal__field">
          <span class="modal__label">刊登日期</span>
          <span id="modal-date" class="modal__value"></span>
        </div>
        <div class="modal__field">
          <span class="modal__label">經歷要求</span>
          <span id="modal-experience" class="modal__value"></span>
        </div>
        <div class="modal__field">
          <span class="modal__label">最低學歷</span>
          <span id="modal-education" class="modal__value"></span>
        </div>
        <div class="modal__field">
          <span class="modal__label">薪水</span>
          <span id="modal-salary" class="modal__value modal__value--salary"></span>
        </div>
      </div>
      <a id="modal-link" href="#" target="_blank" rel="noopener" class="btn-goto">
        前往 104 查看完整詳情 →
      </a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
